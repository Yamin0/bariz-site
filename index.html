  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    .cat-scroll { overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .product-img { transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
    .product-card:hover .product-img,
    .product-card:active .product-img { transform: scale(1.05); }
    .shadow-elevated {
      box-shadow: 0 1px 2px rgba(242,97,32,0.04), 0 4px 8px rgba(26,26,26,0.04), 0 12px 24px rgba(26,26,26,0.06);
    }
    .hero-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
      text-transform: uppercase;
    }
    .grain::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .anim-up { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    .btn-bariz {
      background: #F26120;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s ease;
    }
    .btn-bariz:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(242,97,32,0.35); }
    .btn-bariz:active { transform: scale(0.98); }
    .btn-bariz:focus-visible { outline: 2px solid #F26120; outline-offset: 3px; }
    .btn-outline {
      border: 1.5px solid #1A1A1A;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), background 0.2s ease, color 0.2s ease;
    }
    .btn-outline:hover { background: #1A1A1A; color: #fff; transform: translateY(-1px); }
    .btn-outline:active { transform: scale(0.98); }
    .btn-outline:focus-visible { outline: 2px solid #F26120; outline-offset: 3px; }
    .nav-blur { backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }
    .bottom-nav-item { transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), color 0.2s ease; }
    .bottom-nav-item:active { transform: scale(0.9); }
    .bottom-nav-item.active { color: #F26120; }
    .gallery-scroll { overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .gallery-scroll::-webkit-scrollbar { display: none; }
    .gallery-item { scroll-snap-align: center; }
  </style>

// ===================== FAVORITES =====================
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('bariz_favorites') || '[]'); }
  catch(e) { return []; }
}
function saveFavorites(favs) {
  localStorage.setItem('bariz_favorites', JSON.stringify(favs));
}
function isFavorite(productId) {
  return getFavorites().includes(productId);
}
function toggleFavorite(productId, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  let favs = getFavorites();
  if (favs.includes(productId)) {
    favs = favs.filter(id => id !== productId);
  } else {
    favs.push(productId);
  }
  saveFavorites(favs);
  // Update all heart icons for this product
  document.querySelectorAll('[data-fav-id="' + productId + '"]').forEach(el => {
    el.innerHTML = favs.includes(productId) ? heartFilledSVG : heartOutlineSVG;
  });
  // Update modal heart if open
  const modalHeart = document.getElementById('modalFavBtn');
  if (modalHeart && modalHeart.dataset.productId === productId) {
    modalHeart.innerHTML = favs.includes(productId) ? heartFilledSVG : heartOutlineSVG;
  }
  // Update fav count badge
  updateFavBadge();
}

const heartOutlineSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
const heartFilledSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="#F26120" stroke="#F26120" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';

function updateFavBadge() {
  const count = getFavorites().length;
  const badge = document.getElementById('favBadge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }
}

// ===================== CATEGORY PILLS with brand logos =====================
function renderCategoryPills() {
  const wrap = document.getElementById('catScroll');
  const featured = ['louis-vuitton','dior','gucci','balenciaga','hermes','prada','chanel','bottega','off-white','nike','amiri','valentino','burberry','mcqueen','rick-owens','clothing','sunglasses'];
  const cats = featured.map(id => CATEGORIES.find(c => c.id === id)).filter(Boolean);

  wrap.innerHTML = cats.map(c => {
    const logo = BRAND_LOGOS[c.id] || '';
    return `
      <button onclick="showCategory('${c.id}')" class="flex-shrink-0 flex flex-col items-center gap-2 w-[68px]" style="transition: transform 0.2s cubic-bezier(0.22,1,0.36,1);">
        <div class="w-[60px] h-[60px] rounded-full overflow-hidden bg-white border-2 border-transparent hover:border-bariz flex items-center justify-center p-2" style="transition: border-color 0.2s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.08);">
          <img src="${logo}" alt="${c.name}" class="w-full h-full object-contain" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'font-display text-[11px] font-bold text-noir\\'>${c.slug}</span>';">
        </div>
        <span class="font-body text-[10px] text-noir font-medium text-center leading-tight truncate w-full">${c.name}</span>
      </button>
    `;
  }).join('');
}

// ===================== MENU =====================
function renderMenuCategories() {
  const wrap = document.getElementById('menuCategories');
  wrap.innerHTML = CATEGORIES.map(c => `
    <button onclick="showCategory('${c.id}'); closeMenu();" class="w-full text-left px-3 py-2.5 rounded-lg font-body text-sm text-noir hover:bg-gris-light hover:text-bariz transition-colors flex justify-between items-center">
      <span>${c.name}</span>
      <span class="text-[10px] text-gris font-medium">${c.count}</span>
    </button>
  `).join('');
}

// ===================== PRODUCT GRID =====================
function loadMoreProducts() {
  const grid = document.getElementById('productGrid');
  const end = Math.min(displayedProducts + PRODUCTS_PER_PAGE, ALL_PRODUCTS.length);
  const slice = ALL_PRODUCTS.slice(displayedProducts, end);

  slice.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'anim-up';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = productCardHTML(p);
    grid.appendChild(card);
  });

  displayedProducts = end;
  document.getElementById('productCount').textContent = `${ALL_PRODUCTS.length} articles`;
  document.getElementById('loadMoreWrap').classList.toggle('hidden', displayedProducts >= ALL_PRODUCTS.length);
}

function productCardHTML(p) {
  const fav = isFavorite(p.id);
  return `
    <button onclick="openProduct('${p.id}')" class="product-card w-full text-left rounded-xl">
      <div class="relative overflow-hidden rounded-xl bg-gris-light aspect-square shadow-elevated">
        <img src="${p.img}" alt="${p.name}" class="product-img w-full h-full object-cover" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x400/f5f5f3/1a1a1a?text=${encodeURIComponent(p.name.substring(0,15))}'">
        <div class="absolute inset-0 bg-gradient-to-t from-black/15 to-transparent"></div>
        <button onclick="toggleFavorite('${p.id}', event)" data-fav-id="${p.id}" class="absolute top-2 right-2 w-8 h-8 bg-white rounded-full flex items-center justify-center" style="box-shadow: 0 1px 4px rgba(0,0,0,0.12); transition: transform 0.2s cubic-bezier(0.22,1,0.36,1);" onmousedown="this.style.transform='scale(0.9)'" onmouseup="this.style.transform='scale(1)'">${fav ? heartFilledSVG : heartOutlineSVG}</button>
      </div>
      <div class="mt-2.5 px-0.5">
        <p class="font-body text-[10px] text-gris uppercase tracking-wider">${p.brand}</p>
        <p class="font-body text-xs font-medium text-noir leading-tight mt-0.5 truncate">${p.name}</p>
        <p class="font-body text-xs font-semibold text-bariz mt-1">${p.price}\u20AC</p>
      </div>
    </button>
  `;
}

// ===================== VIEWS =====================
function showHome() {
  currentView = 'home';
  document.getElementById('heroSection').classList.remove('hidden');
  document.getElementById('catSection').classList.remove('hidden');
  document.getElementById('brandBanner').classList.remove('hidden');
  document.getElementById('featuredSection').classList.remove('hidden');
  document.getElementById('allCategoriesView').classList.add('hidden');
  document.getElementById('categoryView').classList.add('hidden');
  document.getElementById('favoritesView').classList.add('hidden');
  setActiveNav('navHome');
  updateNavForView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showAllCategories() {
  previousView = currentView;
  currentView = 'allCategories';
  document.getElementById('heroSection').classList.add('hidden');
  document.getElementById('catSection').classList.add('hidden');
  document.getElementById('brandBanner').classList.add('hidden');
  document.getElementById('featuredSection').classList.add('hidden');
  document.getElementById('allCategoriesView').classList.remove('hidden');
  document.getElementById('categoryView').classList.add('hidden');
  document.getElementById('favoritesView').classList.add('hidden');
  setActiveNav('navCat');
  updateNavForView();
  renderAllCategories();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getCategoryCoverImage(catId) {
  const product = ALL_PRODUCTS.find(p => p.cat === catId);
  return product ? product.img : '';
}

function renderAllCategories() {
  const grid = document.getElementById('allCatGrid');
  grid.innerHTML = CATEGORIES.map((c, i) => {
    const coverImg = getCategoryCoverImage(c.id);
    return `
      <button onclick="showCategory('${c.id}')" class="text-left rounded-xl overflow-hidden shadow-elevated anim-up" style="animation-delay: ${i * 0.03}s">
        <div class="relative aspect-[4/5] bg-noir overflow-hidden">
          ${coverImg ? `<img src="${coverImg}" alt="${c.name}" class="w-full h-full object-cover" loading="lazy" style="opacity:0.7; mix-blend-mode: luminosity;" onerror="this.style.display='none'">` : ''}
          <div class="absolute inset-0 bg-gradient-to-t from-noir via-noir/50 to-noir/20"></div>
          <div class="absolute bottom-0 left-0 right-0 p-4">
            <p class="font-display text-white text-sm font-bold tracking-tight">${c.name}</p>
            <p class="font-body text-white/50 text-[10px] mt-0.5">${c.count} articles</p>
          </div>
        </div>
      </button>
    `;
  }).join('');
}

function showCategory(catId) {
  previousView = currentView;
  currentView = 'category';
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;

  document.getElementById('heroSection').classList.add('hidden');
  document.getElementById('catSection').classList.add('hidden');
  document.getElementById('brandBanner').classList.add('hidden');
  document.getElementById('featuredSection').classList.add('hidden');
  document.getElementById('allCategoriesView').classList.add('hidden');
  document.getElementById('categoryView').classList.remove('hidden');
  document.getElementById('favoritesView').classList.add('hidden');
  setActiveNav('navCat');
  updateNavForView();

  document.getElementById('categoryTitle').textContent = cat.name;
  currentCatProducts = ALL_PRODUCTS.filter(p => p.cat === catId);
  document.getElementById('categoryCount').textContent = `${currentCatProducts.length} articles`;

  displayedCatProducts = 0;
  document.getElementById('categoryGrid').innerHTML = '';
  loadMoreCategoryProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadMoreCategoryProducts() {
  const grid = document.getElementById('categoryGrid');
  const end = Math.min(displayedCatProducts + PRODUCTS_PER_PAGE, currentCatProducts.length);
  const slice = currentCatProducts.slice(displayedCatProducts, end);

  slice.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'anim-up';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = productCardHTML(p);
    grid.appendChild(card);
  });

  displayedCatProducts = end;
  document.getElementById('catLoadMoreWrap').classList.toggle('hidden', displayedCatProducts >= currentCatProducts.length);
}

function goBackFromCategory() {
  if (previousView === 'allCategories') showAllCategories();
  else if (previousView === 'favorites') showFavorites();
  else showHome();
}

// ===================== FAVORITES VIEW =====================
function showFavorites() {
  previousView = currentView;
  currentView = 'favorites';
  document.getElementById('heroSection').classList.add('hidden');
  document.getElementById('catSection').classList.add('hidden');
  document.getElementById('brandBanner').classList.add('hidden');
  document.getElementById('featuredSection').classList.add('hidden');
  document.getElementById('allCategoriesView').classList.add('hidden');
  document.getElementById('categoryView').classList.add('hidden');
  document.getElementById('favoritesView').classList.remove('hidden');
  setActiveNav('navFav');
  updateNavForView();
  renderFavorites();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderFavorites() {
  const grid = document.getElementById('favoritesGrid');
  const emptyMsg = document.getElementById('favoritesEmpty');
  const favIds = getFavorites();
  const favProducts = favIds.map(id => ALL_PRODUCTS.find(p => p.id === id)).filter(Boolean);

  document.getElementById('favoritesCount').textContent = `${favProducts.length} article${favProducts.length !== 1 ? 's' : ''}`;

  if (favProducts.length === 0) {
    grid.innerHTML = '';
    emptyMsg.classList.remove('hidden');
    return;
  }

  emptyMsg.classList.add('hidden');
  grid.innerHTML = favProducts.map((p, i) => `<div class="anim-up" style="animation-delay: ${i * 0.04}s">${productCardHTML(p)}</div>`).join('');
}

// ===================== PRODUCT MODAL =====================
function openProduct(productId) {
  const p = ALL_PRODUCTS.find(x => x.id === productId);
  if (!p) return;

  const modal = document.getElementById('productModal');
  const overlay = modal.querySelector('.modal-overlay');
  const content = modal.querySelector('.modal-content');

  document.getElementById('modalBrand').textContent = p.brand;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalPrice').textContent = p.price + '\u20AC';
  document.getElementById('modalDesc').textContent = 'Disponible en plusieurs tailles et coloris. Contactez-nous pour v\u00E9rifier la disponibilit\u00E9.';
  document.getElementById('modalLink').href = 'https://zzztop.x.yupoo.com/albums/' + p.album;

  // Favorite button in modal
  const modalFavBtn = document.getElementById('modalFavBtn');
  modalFavBtn.dataset.productId = p.id;
  modalFavBtn.innerHTML = isFavorite(p.id) ? heartFilledSVG : heartOutlineSVG;

  document.getElementById('modalGallery').innerHTML = p.imgs.map(img => `
    <div class="gallery-item flex-shrink-0 w-[85vw] max-w-[360px]">
      <div class="aspect-square bg-gris-light mx-2 rounded-xl overflow-hidden">
        <img src="${img}" alt="${p.name}" class="w-full h-full object-cover" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/400x400/f5f5f3/1a1a1a?text=${encodeURIComponent(p.name.substring(0,15))}'">
      </div>
    </div>
  `).join('');

  modal.classList.remove('hidden');
  requestAnimationFrame(() => { overlay.style.opacity = '1'; content.style.transform = 'translateY(0)'; });
  document.body.style.overflow = 'hidden';
}

function closeProductModal() {
  const modal = document.getElementById('productModal');
  const overlay = modal.querySelector('.modal-overlay');
  const content = modal.querySelector('.modal-content');
  overlay.style.opacity = '0';
  content.style.transform = 'translateY(100%)';
  setTimeout(() => { modal.classList.add('hidden'); document.body.style.overflow = ''; }, 350);
  // Refresh favorites view if we're on it
  if (currentView === 'favorites') renderFavorites();
}

// ===================== SEARCH =====================
function openSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.style.visibility = 'visible';
  overlay.style.transform = 'translateY(0)';
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('searchInput').focus(), 400);
}

function closeSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.style.transform = 'translateY(100%)';
  document.body.style.overflow = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  setTimeout(() => { overlay.style.visibility = 'hidden'; }, 400);
}

function handleSearch(query) {
  const results = document.getElementById('searchResults');
  if (!query.trim()) { results.innerHTML = '<p class="font-body text-sm text-gris mt-8 text-center">Tapez pour rechercher...</p>'; return; }
  const q = query.toLowerCase();
  const matches = ALL_PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q));
  if (!matches.length) { results.innerHTML = '<p class="font-body text-sm text-gris mt-8 text-center">Aucun r\u00E9sultat trouv\u00E9</p>'; return; }
  const shown = matches.slice(0, 40);
  results.innerHTML = `<p class="font-body text-xs text-gris mb-4">${matches.length} r\u00E9sultat(s)</p><div class="grid grid-cols-2 gap-3">${shown.map(p => productCardHTML(p)).join('')}</div>`;
}

// ===================== MENU =====================
function openMenu() {
  const m = document.getElementById('sideMenu');
  m.style.pointerEvents = 'auto';
  document.getElementById('menuOverlay').style.opacity = '1';
  document.getElementById('menuPanel').style.transform = 'translateX(0)';
  document.body.style.overflow = 'hidden';
}

function closeMenu() {
  document.getElementById('menuOverlay').style.opacity = '0';
  document.getElementById('menuPanel').style.transform = 'translateX(-100%)';
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('sideMenu').style.pointerEvents = 'none'; }, 400);
}

function setActiveNav(id) {
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function scrollToProducts() {
  document.getElementById('featuredSection').scrollIntoView({ behavior: 'smooth' });
}

// ===================== NAV SCROLL =====================
function updateNavForView() {
  const nav = document.getElementById('topNav');
  if (currentView !== 'home') {
    nav.style.background = 'rgba(255,255,255,0.95)';
    nav.style.backdropFilter = 'blur(20px) saturate(180%)';
    nav.style.borderBottom = '1px solid rgba(0,0,0,0.05)';
    nav.querySelectorAll('.nav-stroke').forEach(el => el.setAttribute('stroke', '#1A1A1A'));
    nav.querySelector('.nav-logo-orange').classList.add('hidden');
    nav.querySelector('.nav-logo-dark').classList.remove('hidden');
  } else {
    navScrolled = false;
    nav.style.background = 'transparent';
    nav.style.backdropFilter = 'none';
    nav.style.borderBottom = 'none';
    nav.querySelectorAll('.nav-stroke').forEach(el => el.setAttribute('stroke', 'white'));
    nav.querySelector('.nav-logo-orange').classList.remove('hidden');
    nav.querySelector('.nav-logo-dark').classList.add('hidden');
  }
}

let navScrolled = false;
window.addEventListener('scroll', () => {
  if (currentView !== 'home') return;
  const hero = document.getElementById('heroSection');
  const nav = document.getElementById('topNav');
  const threshold = hero ? hero.offsetHeight - 80 : 300;

  if (window.scrollY > threshold && !navScrolled) {
    navScrolled = true;
    nav.style.background = 'rgba(255,255,255,0.95)';
    nav.style.backdropFilter = 'blur(20px) saturate(180%)';
    nav.style.borderBottom = '1px solid rgba(0,0,0,0.05)';
    nav.querySelectorAll('.nav-stroke').forEach(el => el.setAttribute('stroke', '#1A1A1A'));
    nav.querySelector('.nav-logo-orange').classList.add('hidden');
    nav.querySelector('.nav-logo-dark').classList.remove('hidden');
  } else if (window.scrollY <= threshold && navScrolled) {
    navScrolled = false;
    nav.style.background = 'transparent';
    nav.style.backdropFilter = 'none';
    nav.style.borderBottom = 'none';
    nav.querySelectorAll('.nav-stroke').forEach(el => el.setAttribute('stroke', 'white'));
    nav.querySelector('.nav-logo-orange').classList.remove('hidden');
    nav.querySelector('.nav-logo-dark').classList.add('hidden');
  }
}, { passive: true });

</script>
